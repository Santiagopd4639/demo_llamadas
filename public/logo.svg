<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Shadow -->
  <ellipse cx="100" cy="185" rx="55" ry="8" fill="rgba(0,0,0,0.18)"/>

  <!-- A letter body - left leg -->
  <polygon points="18,162 58,162 78,100 52,100" fill="url(#leftFace)"/>
  <!-- A letter body - right leg -->
  <polygon points="142,162 182,162 148,100 122,100" fill="url(#rightFace)"/>
  <!-- A letter body - top peak -->
  <polygon points="100,28 52,100 148,100" fill="url(#topFace)"/>
  <!-- A crossbar cutout top -->
  <polygon points="70,92 130,92 120,115 80,115" fill="url(#crossbarTop)"/>

  <!-- 3D left side face (dark) -->
  <polygon points="18,162 52,100 65,108 30,168" fill="url(#sideDark)"/>
  <!-- 3D right side face -->
  <polygon points="182,162 148,100 135,108 170,168" fill="url(#sideLight)"/>

  <!-- Crossbar - front face -->
  <polygon points="72,115 128,115 120,128 80,128" fill="url(#crossFront)"/>

  <!-- Blue swoosh arrow - shadow/body -->
  <path d="M 22,138 Q 80,88 148,52 L 175,38 L 162,72 Q 110,95 55,148 Z" fill="url(#arrowBody)" opacity="0.92"/>
  <!-- Blue swoosh - highlight top edge -->
  <path d="M 22,138 Q 80,88 148,52 L 175,38 Q 120,62 58,118 Z" fill="url(#arrowTop)" opacity="0.95"/>
  <!-- Arrow head -->
  <polygon points="162,72 175,38 142,58" fill="url(#arrowHead)"/>
  <!-- Arrow head shine -->
  <polygon points="168,48 175,38 155,46" fill="#7dd8ff" opacity="0.7"/>

  <defs>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8dde8"/>
      <stop offset="100%" stop-color="#a8b2c4"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d0de"/>
      <stop offset="100%" stop-color="#98a4b8"/>
    </linearGradient>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0f3f8"/>
      <stop offset="100%" stop-color="#c2cad8"/>
    </linearGradient>
    <linearGradient id="crossbarTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9aa4b8"/>
      <stop offset="100%" stop-color="#7a8498"/>
    </linearGradient>
    <linearGradient id="sideDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8892a4"/>
      <stop offset="100%" stop-color="#a8b2c4"/>
    </linearGradient>
    <linearGradient id="sideLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8c2d4"/>
      <stop offset="100%" stop-color="#d0d8e8"/>
    </linearGradient>
    <linearGradient id="crossFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b0baca"/>
      <stop offset="100%" stop-color="#8a94a8"/>
    </linearGradient>
    <linearGradient id="arrowBody" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a3dbf"/>
      <stop offset="50%" stop-color="#1a6aee"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>
    <linearGradient id="arrowTop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a72ff"/>
      <stop offset="60%" stop-color="#42aaff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="arrowHead" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0044bb"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>
  </defs>
</svg>
